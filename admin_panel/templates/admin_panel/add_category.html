{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h4 class="mb-0">
                        Add Category
                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Category Name
                            </label>

                            {{ form.name }}

                            {% if form.name.errors %}

                                <div class="text-danger mt-1">

                                    {{ form.name.errors }}

                                </div>

                            {% endif %}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success"
                        >
                            Save Category
                        </button>

                        <a
                            href="{% url 'category_management' %}"
                            class="btn btn-secondary"
                        >
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
