<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadZone | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sidebar-gradient: linear-gradient(180deg, #5B7CFA, #6D5DF6); --bg-color: #f2f7f5; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: -260px; top: 0; background: var(--sidebar-gradient); color: white; padding: 24px; z-index: 1050; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .sidebar.active { left: 0; }
        
        /* Backdrop Overlay */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1040; display: none; }
        .sidebar-overlay.active { display: block; }

        .main-content { margin-left: 0; padding: 24px; transition: 0.3s; }
        @media (min-width: 992px) { 
            .sidebar { left: 0; } 
            .main-content { margin-left: 260px; } 
        }

        /* 3D Container */
        .hero-3d { height: 200px; width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 2rem; position: relative; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>ReadZone</h3>
            <button class="btn btn-link text-white d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>
        <nav class="nav flex-column gap-2">
            <a href="#" class="nav-link text-white"><i class="bi bi-grid me-2"></i> Dashboard</a>
            <a href="#" class="nav-link text-white"><i class="bi bi-people me-2"></i> Users</a>
            <a href="#" class="nav-link text-white"><i class="bi bi-book me-2"></i> Books</a>
        </nav>
    </div>

    <main class="main-content">
        <button class="btn btn-dark mb-4 d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list"></i> Menu</button>
        
        <div class="hero-3d" id="hero-3d"></div>

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        
        // Basic Three.js Particle Background
        const container = document.getElementById('hero-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth/200, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(container.clientWidth, 200);
        container.appendChild(renderer.domElement);
        
        const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);
        camera.position.z = 30;
        
        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.01;
            torus.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
