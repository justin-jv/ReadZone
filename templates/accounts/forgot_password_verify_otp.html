{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-3">
                        Forgot Password OTP Verification
                    </h2>

                    <p class="text-center">
                        Attempts Remaining:
                        <strong>{{ remaining_attempts }}</strong>
                    </p>

                    <p
                        id="timer"
                        class="text-center text-danger fw-bold"
                    ></p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-warning">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                            type="submit"
                            id="verify-btn"
                            class="btn btn-success w-100"
                        >
                            Verify OTP
                        </button>

                    </form>

                    <div
                        id="resend-container"
                        class="text-center mt-3"
                        style="display:none;"
                    >

                        <a
                            href="{% url 'forgot_password_resend_otp' %}"
                            class="btn btn-outline-primary"
                        >
                            Resend OTP
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

<script>

    const createdAt = {{ otp_created_at }};
    const attemptLimitReached =
        {{ attempt_limit_reached|yesno:"true,false" }};
    const expirySeconds = 60;

    function updateTimer() {

        const currentTime = Date.now() / 1000;

        const elapsed =
            Math.floor(currentTime - createdAt);

        const remaining =
            expirySeconds - elapsed;

        const timerElement =
            document.getElementById('timer');

        const verifyButton =
            document.getElementById('verify-btn');

        const resendContainer =
            document.getElementById('resend-container');

        if (remaining <= 0) {

            timerElement.innerHTML =
                "OTP Expired";

            verifyButton.disabled = true;

            resendContainer.style.display =
                "block";

            return;
        }

        timerElement.innerHTML =
            "OTP expires in: "
            + remaining +
            " seconds";
    }

    if (attemptLimitReached) {

        document.getElementById('timer').innerHTML =
            "Maximum attempts reached";

        document.getElementById('verify-btn').disabled =
            true;

        document.getElementById('resend-container').style.display =
            "block";
    }
    else {

        updateTimer();

        setInterval(updateTimer, 1000);
    }

</script>
